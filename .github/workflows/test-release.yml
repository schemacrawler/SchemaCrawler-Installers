name: Test Packaged Releases

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to test (without leading v, e.g. 1.2.3)"
        required: true
        default: 17.7.0

jobs:
  test-brew:
    name: Test Homebrew package
    runs-on: macos-latest

    steps:
      - name: Checkout (minimal)
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Homebrew
        shell: bash
        run: |
          # Install Homebrew
          brew update
          # Set up SchemaCrawler tap
          brew tap SchemaCrawler/homebrew-tap
          echo '$ brew search schemacrawler'
          brew search schemacrawler
          echo '$ brew info schemacrawler'
          brew info schemacrawler

      - name: Install SchemaCrawler with Homebrew
        shell: bash
        run: |
          # Install SchemaCrawler as a cask
          brew install --cask schemacrawler          

      - name: Smoke test command
        run: |
          schemacrawler --version

  test-sdkman:
    name: Test SDKMAN candidate
    runs-on: ubuntu-latest

    env:
      SDKMAN_DIR: ${{ github.workspace }}/.sdkman

    steps:
      - name: Checkout (minimal)
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install SDKMAN (CI mode)
        shell: bash
        run: |
          curl -s "https://get.sdkman.io?ci=true" | bash
          source "$SDKMAN_DIR/bin/sdkman-init.sh"
          sdk version

      - name: Install SchemaCrawler with SDKMAN
        shell: bash
        run: |
          source "$SDKMAN_DIR/bin/sdkman-init.sh"
          sdk install schemacrawler ${{ github.event.inputs.version }}
          sdk current schemacrawler

      - name: Smoke test command
        shell: bash
        run: |
          source "$SDKMAN_DIR/bin/sdkman-init.sh"
          schemacrawler --version
